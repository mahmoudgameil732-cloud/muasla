<div class="flex items-center gap-4">
<button class="scale-95 transition-transform duration-150 text-blue-800">

</button>
<h1 class="font-manrope display-md tracking-tight text-xl font-bold text-blue-900">Moasla | مواصله</h1>
</div>
<div class="flex items-center gap-3">
<div class="text-right hidden sm:block">
<p class="text-xs font-bold text-blue-900">Ahmed Mansour</p>
<p class="text-[10px] text-slate-500">Microbus Driver #4421</p>
</div>
<img alt="Driver Profile" class="w-10 h-10 rounded-full object-cover" data-alt="Professional headshot of a middle-aged male driver smiling warmly, wearing a clean collared shirt against a neutral studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7GwrxFiAKyhmzfYe98m9RtWlaJaxSABKz7GZTl26ZnwXnOAY9RHO05zsp6zGZqrT0fX_q3rABkagJtC_u4CjZ0pF9pgVBIzsNpQEw9ViuYEmNmOrwBp7Hut_djY0y4bBJIbOa0aFz6yMHcMlKxEo1oViRMBDm2eLyBI4Rpwf-nXj6jlEThrcbM1yOGf_MBJ103kWZP5GGwsd7z5aDtV_T-smKCrfbYD2h6VntqcXqJuAdyIU9SwBUCuXO4wtRM8Z8Kc9On2iBkC8"/>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto min-h-screen">
<!-- Status Header -->
<section class="mb-10 text-center">
<span class="label-md uppercase tracking-widest text-primary font-bold bg-primary-fixed px-3 py-1 rounded-full">Active Queue</span>
<h2 class="mt-4 text-3xl font-extrabold tracking-tight text-on-surface">Cairo Gateway Terminal</h2>
<p class="text-slate-500 mt-2 font-medium">Updated 2 seconds ago</p>
</section>
<!-- Queue Visual Anchor: The "M" Logo Influence -->
<div class="relative flex flex-col items-center justify-center py-12">
<!-- Background Watermark -->
<div class="absolute inset-0 flex items-center justify-center opacity-[0.03] pointer-events-none">
<span class="material-symbols-outlined text-[300px]" data-icon="hub">hub</span>
</div>
<!-- Position Hero -->
<div class="relative z-10 w-64 h-64 flex flex-col items-center justify-center bg-surface-container-lowest rounded-full shadow-[0_30px_60px_rgba(26,27,33,0.06)] border border-outline-variant/10">
<div class="text-slate-400 font-bold label-md uppercase tracking-tighter mb-1">Position</div>
<div class="text-[100px] font-black text-primary leading-none tracking-tighter">5</div>
<div class="flex items-center gap-1 text-tertiary-container font-bold">
<span class="material-symbols-outlined text-sm" data-icon="trending_down">trending_down</span>
<span class="text-xs">2 spots improved</span>
</div>
</div>
<!-- Pulse Effect Decor -->
<div class="absolute w-72 h-72 border-2 border-primary/5 rounded-full animate-ping opacity-20"></div>
</div>
<!-- Bento Stats Grid -->
<div class="grid grid-cols-2 gap-4 mt-8">
<div class="bg-surface-container-low p-6 rounded-2xl flex flex-col justify-between">
<span class="material-symbols-outlined text-blue-800" data-icon="group">group</span>
<div>
<p class="text-2xl font-bold text-on-surface mt-2">18</p>
<p class="text-xs font-bold text-slate-500 label-md uppercase">Drivers Total</p>
</div>
</div>
<div class="bg-surface-container-low p-6 rounded-2xl flex flex-col justify-between">
<span class="material-symbols-outlined text-tertiary" data-icon="schedule">schedule</span>
<div>
<p class="text-2xl font-bold text-on-surface mt-2">~14m</p>
<p class="text-xs font-bold text-slate-500 label-md uppercase">Est. Wait</p>
</div>
</div>
</div>
<!-- Action Section -->
<div class="mt-10 space-y-4">
<button class="w-full py-6 px-8 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary shadow-xl shadow-primary/20 scale-95 active:scale-90 transition-all duration-200 flex items-center justify-between group">
<div class="text-left">
<p class="text-lg font-bold">I have arrived</p>
<p class="text-sm opacity-80 font-medium">لقد وصلت</p>
</div>
<span class="material-symbols-outlined text-3xl group-hover:translate-x-2 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-full py-4 text-slate-500 font-bold label-md uppercase tracking-widest hover:text-primary transition-colors">
                Leave Queue
            </button>
</div>
</main>
<!-- Navigation Shell Logic: Queue Status is Active -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-white/80 backdrop-blur-xl shadow-[0_-4px_30px_rgba(0,0,0,0.05)] rounded-t-3xl">
<a class="flex flex-col items-center justify-center text-slate-500 px-5 py-2 hover:bg-slate-100 rounded-2xl transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-manrope label-md uppercase tracking-widest mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-blue-100 text-blue-900 rounded-2xl px-5 py-2 scale-98 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="format_list_numbered" style="font-variation-settings: 'FILL' 1;">format_list_numbered</span>
<span class="font-manrope label-md uppercase tracking-widest mt-1 font-bold">Queue</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 px-5 py-2 hover:bg-slate-100 rounded-2xl transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="font-manrope label-md uppercase tracking-widest mt-1">Earnings</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 px-5 py-2 hover:bg-slate-100 rounded-2xl transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="font-manrope label-md uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
