<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- Top App Bar (Suppress Navigation Shell Rules Apply: Back action implies temporary departure) -->

<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">

<div class="relative flex items-center justify-center">
<div class="absolute w-12 h-12 bg-primary/20 rounded-full animate-ping"></div>
<div class="relative bg-primary text-white p-3 rounded-full shadow-lg border-4 border-white">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">directions_bus</span>
</div>
</div>
</div>
</div>

<div class="absolute inset-0 pointer-events-none p-6 flex flex-col justify-between pt-24 pb-12">

<div class="glass-card rounded-xl p-5 shadow-[0_24px_48px_-12px_rgba(0,0,0,0.08)] flex items-center justify-between border border-white/50">
<div class="flex flex-col">

<p class="text-sm text-outline">Current station: Dokki Square</p>
</div>
<div class="h-12 w-12 bg-primary-container/10 rounded-xl flex items-center justify-center">

</div>
</div>
</div>

</div>
</div>
<div class="flex-1">
<div class="flex items-center justify-between">
<h3 class="font-bold text-lg">Ahmed Mahmoud</h3>
<div class="flex items-center gap-1 bg-secondary-container/30 px-2 py-1 rounded-lg">
<span class="material-symbols-outlined text-sm text-primary" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-xs font-bold text-primary">4.9</span>
</div>
</div>
<p class="text-sm text-outline">Mercedes-Benz MCV 600 • ABC 123</p>
</div>
</div>

<button class="flex items-center justify-center gap-2 bg-surface-container-low text-primary py-3 rounded-xl font-semibold hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">chat_bubble</span>
<span>Contact</span>
</button>
<button class="flex items-center justify-center gap-2 bg-surface-container-low text-primary py-3 rounded-xl font-semibold hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">share_location</span>

</button>

</div>
